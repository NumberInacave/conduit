<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>conduit</title>
  <style>
    :root {
      --m-margin: 20px;
      --m-gap: 10px;
      --m-btn-bg-color: rgba(100, 100, 100, 0.3);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      position: fixed;
      background: #000;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100svh;
      touch-action: none;
    }

    #m-ui {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    .m-btn {
      border: none;
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      pointer-events: auto;
      z-index: 110;
      font-size: 32px;
    }

    #m-action-col {
      position: absolute;
      top: var(--m-margin);
      right: var(--m-margin);
      display: flex;
      flex-direction: column;
      gap: var(--m-gap);
    }

    #m-dash-btn,
    #m-grap-btn {
      width: 150px;
      height: 150px;
    }

    #m-dash-btn,
    #m-grap-btn {
      background: var(--m-btn-bg-color);
    }

    #m-utils {
      position: absolute;
      bottom: var(--m-margin);
      right: var(--m-margin);
      display: flex;
      gap: var(--m-gap);
    }

    .m-btn-small {
      width: 75px;
      height: 75px;
      background: var(--m-btn-bg-color);
    }

    #m-l {
      position: absolute;
      inset: 0 50% 0 0;
      pointer-events: auto;
      z-index: 100;
    }

    #m-r {
      position: absolute;
      inset: 0 0 0 50%;
      pointer-events: auto;
      z-index: 100;
    }
  </style>
</head>

    window.onkeydown = e => {
      if (e.code === "KeyP" || e.code === "KeyE") {
        paused = !paused;

        if (paused) {
          document.exitPointerLock();
        } else {
          if (keys["Space"] && !grapple.active && !controlsLocked) fireHarpoon();
        }
        return;
      }

      if (e.code === "KeyG" || e.code === "KeyQ") {
        gridShown = !gridShown;
      }

      if (e.code === "KeyO" || e.code === "KeyF") {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen().then(() => {
            canvas.requestPointerLock();
          }).catch(err => console.log(err));
        } else {
          document.exitFullscreen();
          document.exitPointerLock();
        }
        return;
      }

      keys[e.code] = !0;
      if (e.code === "Space" && !controlsLocked && !paused && !grapple.active) {
        fireHarpoon();
      }
    };

    window.onkeyup = e => {
      keys[e.code] = !1;
      if (e.code === "Space" && grapple.active && !paused) {
        grapple.attached = !1;
        grapple.returning = !0;
      }
    };

    window.addEventListener("mousemove", e => {
      if (document.pointerLockElement === canvas) {
        mouse.x += e.movementX;
        mouse.y += e.movementY;
      } else {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      }
      mouse.x = Math.max(0, Math.min(w, mouse.x));
      mouse.y = Math.max(0, Math.min(h, mouse.y));
    });


    canvas.addEventListener("click", async () => {
      if (!document.pointerLockElement) {
        try {
          await canvas.requestFullscreen();
          await canvas.requestPointerLock();
        } catch (err) {
          console.error(err);
        }
      }
    });

    function fireHarpoon() {
      if (grapple.active) return;
      grapple.active = !0; grapple.attached = !1; grapple.x = player.x; grapple.y = player.y;
      const a = Math.atan2(mouse.y - h / 2, mouse.x - w / 2);
      grapple.vx = Math.cos(a) * grapple.strength; grapple.vy = Math.sin(a) * grapple.strength;
    }

    function getRayWallDist(x, y, vx, vy) {
      let minT = 1;
      let hit = null;
      walls.forEach(w => {
        let tX0 = (w.x - x) / vx, tX1 = (w.x + w.w - x) / vx;
        let tY0 = (w.y - y) / vy, tY1 = (w.y + w.h - y) / vy;
        let tMin = Math.max(Math.min(tX0, tX1), Math.min(tY0, tY1));
        let tMax = Math.min(Math.max(tX0, tX1), Math.max(tY0, tY1));
        if (tMax >= tMin && tMax > 0 && tMin < minT) {
          minT = tMin;
          hit = w;
        }
      });
      return { t: minT, wall: hit };
    }

    let levelPool = [];

    function loadLevel(isNewSector = true) {
      controlsLocked = true;
      levelTimer = 60;
      gravityZones = [];

      if (isNewSector || lastLevelIndex === -1) {
        if (levelPool.length === 0) {
          levelPool = levels.map((_, i) => i);
          for (let i = levelPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [levelPool[i], levelPool[j]] = [levelPool[j], levelPool[i]];
          }
        }

        lastLevelIndex = levelPool.pop();
        localStorage.setItem('storedLevel', lastLevelIndex);
      }

      const l = levels[lastLevelIndex];
      l.build();
      currentLevelName = l.name;
      document.title = "conduit - " + String(currentLevelName).toLowerCase();

      grapple.active = false;
      player.vx = 0; player.vy = 0;
      camFollX = player.x; camFollY = player.y;
      camX = player.x - w / 2; camY = player.y - h / 2;

      setTimeout(() => { controlsLocked = false; }, 1000);
    }

    function update() {
      if (levelTimer > 0) levelTimer--;

      if (!controlsLocked && !paused) {
        if (grapple.active) {
          if (grapple.attached) {
            const dx = grapple.x - player.x, dy = grapple.y - player.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 0.0001) {
              const nx = dx / dist, ny = dy / dist;
              const vMag = Math.hypot(player.vx, player.vy);

              grapple.stiffness = vMag > 0.1 ? (Math.abs((player.vx / vMag) * nx + (player.vy / vMag) * ny) * 0.8) : 1;

              let forceX = dx * grapple.elasticity + nx * (grapple.pullStrength * grapple.stiffness);
              let forceY = dy * grapple.elasticity + ny * (grapple.pullStrength * grapple.stiffness);

              if (!isNaN(forceX) && !isNaN(forceY)) {
                player.vx += forceX;
                player.vy += forceY;
              }
            }

            if (!keys.Space) {
              grapple.wasInGZone = gravityZones.some(z => Math.hypot(grapple.x - Math.max(z.x, Math.min(grapple.x, z.x + z.w)), grapple.y - Math.max(z.y, Math.min(grapple.y, z.y + z.h))) <= 20);
              grapple.attached = !1; grapple.returning = !0;
            }

          } else if (grapple.returning) {
            const dx = player.x - grapple.x, dy = player.y - grapple.y, dist = Math.hypot(dx, dy);

            const currentlyInGZone = gravityZones.some(z => grapple.x > z.x && grapple.x < z.x + z.w && grapple.y > z.y && grapple.y < z.y + z.h);
            const speed = currentlyInGZone ? (grapple.strength / 4) : (grapple.strength / 2);

            const rx = (dx / dist) * speed, ry = (dy / dist) * speed;
            grapple.x += rx; grapple.y += ry;

            if (dist < 40) {
              const playerInGZone = gravityZones.some(z => player.x > z.x && player.x < z.x + z.w && player.y > z.y && player.y < z.y + z.h);

              if (player.onGround) {
                const nx = dx / dist, ny = dy / dist;
                player.vx += nx * (grapple.strength * 0.1); player.vy += ny * (grapple.strength * 0.1);
              }

              grapple.active = !1;
              grapple.returning = !1;
              grapple.wasInGZone = !1;
            }
          } else {
            let minT = 1, hitWall = null;
            walls.forEach(w => {
              let gvx = grapple.vx || 0.0001, gvy = grapple.vy || 0.0001;
              let tX0 = (w.x - grapple.x) / gvx, tX1 = (w.x + w.w - grapple.x) / gvx;
              let tY0 = (w.y - grapple.y) / gvy, tY1 = (w.y + w.h - grapple.y) / gvy;
              let tMin = Math.max(Math.min(tX0, tX1), Math.min(tY0, tY1));
              let tMax = Math.min(Math.max(tX0, tX1), Math.max(tY0, tY1));
              if (tMax >= tMin && tMax > 0 && tMin < minT) { minT = tMin; hitWall = w; }
            });

            if (hitWall) {
              grapple.x += grapple.vx * minT; grapple.y += grapple.vy * minT;
              grapple.wasInGZone = gravityZones.some(z => Math.hypot(grapple.x - Math.max(z.x, Math.min(grapple.x, z.x + z.w)), grapple.y - Math.max(z.y, Math.min(grapple.y, z.y + z.h))) <= 20);
              grapple.attached = !0;
            } else {
              grapple.x += grapple.vx;
              grapple.y += grapple.vy;
            }

            if (hazards.some(h => grapple.x > h.x && grapple.x < h.x + h.w && grapple.y > h.y && grapple.y < h.y + h.h)) {
              grapple.attached = false;
              grapple.returning = true;
            }

            if (Math.hypot(grapple.x - player.x, grapple.y - player.y) > 3000) {
              grapple.returning = !0; grapple.wasInGZone = !1;
            }
          }
        }

        if ((keys.KeyS || keys.ArrowDown) && player.canDash) {
          const a = Math.atan2(mouse.y - h / 2, mouse.x - w / 2);
          player.vx += Math.cos(a) * 25; player.vy += Math.sin(a) * 25;
          player.canDash = !1; player.dashCD = 40;
        }
        player.dashCD = Math.max(0, player.dashCD - 1);
        if (player.onGround && player.dashCD === 0) player.canDash = !0;
        (keys.KeyA || keys.ArrowLeft) && (player.vx -= player.onGround ? 1.0 : AIR_CONTROL);
        (keys.KeyD || keys.ArrowRight) && (player.vx += player.onGround ? 1.0 : AIR_CONTROL);
        player.vx *= player.onGround ? GROUND_FRICTION : AIR_FRICTION;
        if (player.coyote > 0 && (keys.KeyW || keys.ArrowUp)) {
          player.vy = -14;
          player.coyote = 0;
          player.isJumping = true;
        }

        if (!(keys.KeyW || keys.ArrowUp)) {
          player.isJumping = false;
        }

        let currentGravity = GRAVITY;
        gravityZones.forEach(z => {
          if (player.x > z.x && player.x < z.x + z.w && player.y > z.y && player.y < z.y + z.h) {
            currentGravity = z.strength || GRAVITY;
          }
        });

        if (player.isJumping && player.vy < 0) {
          player.vy += currentGravity * 0.45;
        } else {
          player.vy += currentGravity;
        }

        let sideH = player.vx > 0 ? player.size : -player.size;
        let rH1 = getRayWallDist(player.x + sideH, player.y - player.size + 1, player.vx, 0);
        let rH2 = getRayWallDist(player.x + sideH, player.y + player.size - 1, player.vx, 0);
        let minTX = Math.min(rH1.t, rH2.t);
        if (minTX < 1) { player.x += player.vx * minTX; player.vx = 0; }
        else { player.x += player.vx; }

        player.onGround = !1;
        let sideV = player.vy > 0 ? player.size : -player.size;
        let rV1 = getRayWallDist(player.x - player.size + 1, player.y + sideV, 0, player.vy);
        let rV2 = getRayWallDist(player.x + player.size - 1, player.y + sideV, 0, player.vy);
        let minTY = Math.min(rV1.t, rV2.t);
        if (minTY < 1) {
          player.y += player.vy * minTY;
          if (player.vy > 0) { player.onGround = !0; player.coyote = 10; }
          player.vy = 0;
        } else { player.y += player.vy; }

        if (hazards.some(h => player.x + player.size > h.x && player.x - player.size < h.x + h.w && player.y + player.size > h.y && player.y - player.size < h.y + h.h)) loadLevel(false);
        if (player.x > goal.x && player.x < goal.x + goal.w && player.y > goal.y && player.y < goal.y + goal.h) loadLevel(true);
        if (player.y > 10000) loadLevel(false);

        if (!player.onGround) GROUND_FRICTION = lerp(GROUND_FRICTION, 0.95, 0.1)
        else if (player.onGround) GROUND_FRICTION = lerp(GROUND_FRICTION, 0.87, 0.05)
      }

      tilt = Math.max(-0.6, Math.min(0.6, player.vx * 0.05));

      legs.forEach(l => {
        const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
        const localX = l.side * 4, localY = 4;
        const hX = player.x + (localX * cosT - localY * sinT);
        const hY = player.y + (localX * sinT + localY * cosT);

        const other = legs.find(o => o !== l);
        const airRepel = l.side * 4;

        if (player.onGround) {
          const rayStartY = hY + player.size;
          const ground = getRayWallDist(hX + (l.side * 6), rayStartY, 0, 20);
          const groundY = ground.wall ? rayStartY + (ground.t * 20) : rayStartY;

          if (!l.stepping && !other.stepping && Math.hypot(l.x - (hX + (l.side * 6)), l.y - groundY) > 8) {
            l.targetX = hX + (l.side * 6) + (player.vx * 0.4);
            l.targetY = groundY;
            l.stepping = !0;
          }
          if (l.stepping && Math.hypot(l.x - l.targetX, l.y - l.targetY) < 2) l.stepping = !1;
        } else {
          l.targetX = hX + airRepel + Math.max(-12, Math.min(12, -player.vx * 0.1));
          l.targetY = hY + Math.max(-12, Math.min(12, -player.vy * 0.1));
          l.stepping = !1;
        }

        l.x += (l.targetX - l.x) * 0.4;
        l.y += (l.targetY - l.y) * 0.4;
      });

      const followSpeed = 0.15;
      camFollX += (player.x - camFollX) * followSpeed;
      camFollY += (player.y - camFollY) * followSpeed;

      const speed = Math.hypot(player.vx, player.vy);
      const mX = (mouse.x - w / 2) * 0.4;
      const mY = (mouse.y - h / 2) * 0.4;
      const vX = player.vx * 6;
      const vY = player.vy * 6;

      let targetX = camFollX + mX + vX - w / 2;
      let targetY = camFollY + mY + vY - h / 2;

      camX += (targetX - camX) * 0.12;
      camY += (targetY - camY) * 0.12;

      camZoom += ((1 / (1 + (speed * 0.02) + (Math.hypot(mX, mY) * zoomStrength))) - camZoom) * 0.05;

      player.coyote--;

      render();
      requestAnimationFrame(update);
    }

    function render() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = "#0a0a0a";
      ctx.fillRect(0, 0, w, h);

      ctx.translate(w / 2, h / 2);
      ctx.scale(camZoom, camZoom);
      ctx.translate(-w / 2 - camX, -h / 2 - camY);

      ctx.fillStyle = "#511"; hazards.forEach(h => ctx.fillRect(h.x, h.y, h.w, h.h));
      ctx.fillStyle = "#222"; walls.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));
      ctx.fillStyle = "#151"; ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
      ctx.fillStyle = "rgba(0, " + String(126 + rand(-20, 20)) + "," + String(160 + rand(-20, 20)) + ", 0.1)"; gravityZones.forEach(z => { ctx.fillRect(z.x, z.y, z.w, z.h); });


      if (grapple.active) {
        ctx.strokeStyle = grapple.attached ? "#0ff" : (grapple.returning ? "#511" : "#888");
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(grapple.x, grapple.y);
        ctx.stroke();

        ctx.fillStyle = ctx.strokeStyle;
        ctx.fillRect(grapple.x - 5, grapple.y - 5, 10, 10);
      }

      ctx.strokeStyle = "#0ff";
      ctx.lineWidth = 5;
      legs.forEach(l => {
        const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
        const localX = l.side * 4, localY = 4;
        const hX = player.x + (localX * cosT - localY * sinT);
        const hY = player.y + (localX * sinT + localY * cosT);

        ctx.beginPath();
        ctx.moveTo(hX, hY);
        ctx.lineTo(l.x, l.y);
        ctx.stroke();

        ctx.fillStyle = "#0ff";
        ctx.fillRect(l.x - 5, l.y - 5, 10, 10);
      });

      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(tilt);
      ctx.fillStyle = "#0ff";
      ctx.fillRect(-player.size, -player.size, player.size * 2, player.size * 2);
      ctx.lineWidth = player.size / 2;
      ctx.strokeStyle = "#00ffff1a";
      ctx.strokeRect(-player.size, -player.size, player.size * 2, player.size * 2);
      ctx.restore();

      if (levelTimer > 0) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(1, levelTimer / 30)})`;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = `rgba(0, 255, 255, ${Math.min(1, levelTimer / 30)})`;
        ctx.font = "bold 30px monospace";
        ctx.textAlign = "center";
        ctx.fillText(currentLevelName, w / 2, h / 2);
      }

      if (gridShown) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
        ctx.lineWidth = 0.5 / camZoom;
        const startX = Math.floor((camX - w / camZoom) / 100) * 100;
        const endX = Math.ceil((camX + w * 2 / camZoom) / 100) * 100;
        const startY = Math.floor((camY - h / camZoom) / 100) * 100;
        const endY = Math.ceil((camY + h * 2 / camZoom) / 100) * 100;

        for (let x = startX; x <= endX; x += 100) { ctx.moveTo(x, startY); ctx.lineTo(x, endY); }
        for (let y = startY; y <= endY; y += 100) { ctx.moveTo(startX, y); ctx.lineTo(endX, y); }
        ctx.stroke();

        ctx.beginPath();
        const startXMajor = Math.floor(startX / 1000) * 1000, startYMajor = Math.floor(startY / 1000) * 1000;

        for (let x = startXMajor; x <= endX; x += 1000) { ctx.moveTo(x, startY); ctx.lineTo(x, endY); }
        for (let y = startYMajor; y <= endY; y += 1000) { ctx.moveTo(startX, y); ctx.lineTo(endX, y); }
        ctx.stroke();
      }

      if (paused) {
        const worldMX = (mouse.x - w / 2) / camZoom + w / 2 + camX;
        const worldMY = (mouse.y - h / 2) / camZoom + h / 2 + camY;
        const snapX = Math.round(worldMX / 100) * 100;
        const snapY = Math.round(worldMY / 100) * 100;

        ctx.fillStyle = "rgba(0, 255, 255, 0.75)";
        ctx.beginPath();
        ctx.arc(snapX, snapY, 4 / camZoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = `${15 / camZoom}px monospace`;
        ctx.textAlign = "left";
        ctx.fillText(`[${snapX}, ${snapY}]`, snapX + 10 / camZoom, snapY + 5 / camZoom);

        const vMag = Math.hypot(player.vx, player.vy);
        const vAngle = Math.atan2(player.vy, player.vx);

        if (vMag > 5) {
          ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
          ctx.lineWidth = 1 / camZoom;

          const arrowLen = vMag * 10;
          const endX = player.x + Math.cos(vAngle) * arrowLen;
          const endY = player.y + Math.sin(vAngle) * arrowLen;

          ctx.beginPath();
          ctx.moveTo(player.x, player.y);
          ctx.lineTo(endX, endY);

          const headSize = 10 / camZoom;
          ctx.lineTo(endX - headSize * Math.cos(vAngle - Math.PI / 7), endY - headSize * Math.sin(vAngle - Math.PI / 7));
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - headSize * Math.cos(vAngle + Math.PI / 7), endY - headSize * Math.sin(vAngle + Math.PI / 7));
          ctx.stroke();

          ctx.fillStyle = "#0ff";
          ctx.font = `${16 / camZoom}px monospace`;
          ctx.fillText(`${Math.round(vMag * 10)}u/s`, endX + (10 / camZoom), endY);
        }

        ctx.setTransform(1, 0, 0, 1, 0, 0);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px monospace";
        ctx.textAlign = "center";
        ctx.fillText(currentLevelName, w / 2, 50);

        ctx.font = "15px monospace";
        ctx.textAlign = "left";
        ctx.fillText(`MD: ${Math.round(Math.hypot(player.vx, player.vy))} / ${Math.round(Math.atan2(player.vy, player.vx) * 180 / Math.PI)}°`, 20, 30);
        ctx.fillText(`XY: ${Math.round(player.x)} / ${Math.round(player.y)}`, 20, 50);
        ctx.fillText(`CURSOR: ${snapX} / ${snapY}`, 20, 70);
        ctx.fillText(`ON_GROUND: ${player.onGround}`, 20, 90);
        ctx.fillText(`CAN_DASH: ${player.canDash}`, 20, 110);
        ctx.fillText(`GRAPPLE:`, 20, 150);
        ctx.fillText(`ACTIVE: ${grapple.active}`, 20, 170);
        ctx.fillText(`ATTACHED: ${grapple.attached}`, 20, 190);
        ctx.fillText(`RETURNING: ${grapple.returning}`, 20, 210);

        zoomStrength = 0.04;
      } else {
        zoomStrength = 0.0005;
      }

      ctx.setTransform(1, 0, 0, 1, 0, 0);

      canvas.style.cursor = "none";

      ctx.strokeStyle = "#0ff";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(mouse.x, mouse.y - player.size);
      ctx.lineTo(mouse.x, mouse.y + player.size);
      ctx.moveTo(mouse.x - player.size, mouse.y);
      ctx.lineTo(mouse.x + player.size, mouse.y);
      ctx.stroke();

      ctx.fillStyle = "#0ff";
      ctx.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);
    }

    loadLevel(false);
    document.title = "conduit - " + String(currentLevelName).toLowerCase();
    update();
  </script>
</body>

</html>
